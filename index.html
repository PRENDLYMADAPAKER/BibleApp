<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selah | Full Chapter Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..950;1,400..950&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .bible-chapter { font-family: 'Playfair Display', serif; line-height: 2.1; }
    .verse-num { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      font-size: 0.6em; 
      font-weight: 700; 
      color: #9a3412; /* amber-800 */
      margin-right: 4px;
      vertical-align: super;
    }
  </style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen flex flex-col justify-between selection:bg-amber-100">

  <header class="border-b border-stone-200 bg-white/85 backdrop-blur-md sticky top-0 z-10 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
      <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
        <span class="text-xl font-bold tracking-tight text-amber-800">Selah</span>
        <span class="text-[10px] font-bold bg-amber-50 text-amber-800 px-2.5 py-0.5 rounded-full border border-amber-200/60 uppercase tracking-wider">WEB</span>
      </div>
      
      <div class="flex gap-2 w-full sm:w-auto">
        <select id="book-select" class="flex-grow sm:flex-none bg-stone-100 border border-stone-300 rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500/20 shadow-sm cursor-pointer"></select>
        <select id="chapter-select" class="bg-stone-100 border border-stone-300 rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500/20 shadow-sm cursor-pointer w-20"></select>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-3xl w-full mx-auto px-5 py-8 sm:py-12 flex flex-col justify-between relative min-h-[60vh]">
    <div id="loader" class="absolute inset-0 flex items-center justify-center bg-stone-50/90 transition-all opacity-0 pointer-events-none z-20">
      <div class="animate-spin rounded-full h-10 w-10 border-2 border-stone-300 border-t-amber-800"></div>
    </div>

    <div id="reader-content" class="transition-all duration-300 transform opacity-100 flex-grow">
      <div class="text-center mb-10">
        <h1 id="chapter-title" class="text-3xl sm:text-4xl lg:text-5xl font-semibold tracking-tight text-stone-850 font-serif mb-4">Genesis 1</h1>
        <div class="h-0.5 w-16 bg-amber-800/30 mx-auto"></div>
      </div>

      <div id="verses-body" class="bible-chapter text-lg sm:text-xl text-stone-800 text-justify tracking-wide pb-8">
        <!-- Verses inject here -->
      </div>
    </div>

    <div class="flex justify-between items-center mt-8 pt-6 border-t border-stone-200">
      <button id="prev-btn" class="flex items-center gap-2 text-sm font-semibold text-stone-600 hover:text-amber-900 bg-stone-200/50 hover:bg-stone-200 px-4 py-2 rounded-lg transition-colors disabled:opacity-30 disabled:pointer-events-none">
        ← Prev
      </button>
      <button id="next-btn" class="flex items-center gap-2 text-sm font-semibold text-stone-600 hover:text-amber-900 bg-stone-200/50 hover:bg-stone-200 px-4 py-2 rounded-lg transition-colors disabled:opacity-30 disabled:pointer-events-none">
        Next →
      </button>
    </div>
  </main>

  <footer class="border-t border-stone-200 bg-white py-6 text-center">
    <p class="text-[11px] text-stone-400 tracking-wide uppercase font-medium">Powered by Bible-API.com</p>
  </footer>

    <script>
    // Compacted array of all 66 books to save space
    const bibleBooks = [
      { n: "Genesis", c: 50 }, { n: "Exodus", c: 40 }, { n: "Leviticus", c: 27 }, { n: "Numbers", c: 36 }, 
      { n: "Deuteronomy", c: 34 }, { n: "Joshua", c: 24 }, { n: "Judges", c: 21 }, { n: "Ruth", c: 4 }, 
      { n: "1 Samuel", c: 31 }, { n: "2 Samuel", c: 24 }, { n: "1 Kings", c: 22 }, { n: "2 Kings", c: 25 }, 
      { n: "1 Chronicles", c: 29 }, { n: "2 Chronicles", c: 36 }, { n: "Ezra", c: 10 }, { n: "Nehemiah", c: 13 }, 
      { n: "Esther", c: 10 }, { n: "Job", c: 42 }, { n: "Psalms", c: 150 }, { n: "Proverbs", c: 31 }, 
      { n: "Ecclesiastes", c: 12 }, { n: "Song of Solomon", c: 8 }, { n: "Isaiah", c: 66 }, { n: "Jeremiah", c: 52 }, 
      { n: "Lamentations", c: 5 }, { n: "Ezekiel", c: 48 }, { n: "Daniel", c: 12 }, { n: "Hosea", c: 14 }, 
      { n: "Joel", c: 3 }, { n: "Amos", c: 9 }, { n: "Obadiah", c: 1 }, { n: "Jonah", c: 4 }, 
      { n: "Micah", c: 7 }, { n: "Nahum", c: 3 }, { n: "Habakkuk", c: 3 }, { n: "Zephaniah", c: 3 }, 
      { n: "Haggai", c: 2 }, { n: "Zechariah", c: 14 }, { n: "Malachi", c: 4 }, { n: "Matthew", c: 28 }, 
      { n: "Mark", c: 16 }, { n: "Luke", c: 24 }, { n: "John", c: 21 }, { n: "Acts", c: 28 }, 
      { n: "Romans", c: 16 }, { n: "1 Corinthians", c: 16 }, { n: "2 Corinthians", c: 13 }, { n: "Galatians", c: 6 }, 
      { n: "Ephesians", c: 6 }, { n: "Philippians", c: 4 }, { n: "Colossians", c: 4 }, { n: "1 Thessalonians", c: 5 }, 
      { n: "2 Thessalonians", c: 3 }, { n: "1 Timothy", c: 6 }, { n: "2 Timothy", c: 4 }, { n: "Titus", c: 3 }, 
      { n: "Philemon", c: 1 }, { n: "Hebrews", c: 13 }, { n: "James", c: 5 }, { n: "1 Peter", c: 5 }, 
      { n: "2 Peter", c: 3 }, { n: "1 John", c: 5 }, { n: "2 John", c: 1 }, { n: "3 John", c: 1 }, 
      { n: "Jude", c: 1 }, { n: "Revelation", c: 22 }
    ];

    const bookSelect = document.getElementById('book-select');
    const chapterSelect = document.getElementById('chapter-select');
    const chapterTitle = document.getElementById('chapter-title');
    const versesBody = document.getElementById('verses-body');
    const loader = document.getElementById('loader');
    const readerContent = document.getElementById('reader-content');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    let currentBookIdx = 0;
    let currentChapter = 1;

    // Initialize dropdowns
    function initSelectors() {
      bibleBooks.forEach((book, idx) => {
        const option = document.createElement('option');
        option.value = idx;
        option.textContent = book.n;
        bookSelect.appendChild(option);
      });
      updateChapterDropdown();
    }

    function updateChapterDropdown() {
      chapterSelect.innerHTML = '';
      const totalChapters = bibleBooks[currentBookIdx].c;
      for (let i = 1; i <= totalChapters; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i;
        if (i === currentChapter) option.selected = true;
        chapterSelect.appendChild(option);
      }
    }

    // Fetch and Display the chapter
    async function loadChapter() {
      const bookName = bibleBooks[currentBookIdx].n;
      const ref = `${bookName} ${currentChapter}`;
      
      loader.classList.remove('opacity-0', 'pointer-events-none');
      readerContent.classList.add('opacity-30');

      try {
        const response = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}`);
        const data = await response.json();
        
        chapterTitle.textContent = ref;
        
        // Map verses and format them as superscript numbers + text
        versesBody.innerHTML = data.verses.map(v => 
          `<span class="verse-span"><span class="verse-num">${v.verse}</span>${v.text.trim()} </span>`
        ).join('');
        
        updateButtons();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        versesBody.innerHTML = `<p class="text-red-500 text-center">Error loading chapter. Please try again.</p>`;
      } finally {
        loader.classList.add('opacity-0', 'pointer-events-none');
        readerContent.classList.remove('opacity-30');
      }
    }

    // Handle Prev/Next logic
    function updateButtons() {
      const isFirstChapter = currentBookIdx === 0 && currentChapter === 1;
      const isLastChapter = currentBookIdx === bibleBooks.length - 1 && currentChapter === bibleBooks[bibleBooks.length - 1].c;
      
      prevBtn.disabled = isFirstChapter;
      nextBtn.disabled = isLastChapter;
    }

    function goNext() {
      if (currentChapter < bibleBooks[currentBookIdx].c) {
        currentChapter++;
      } else if (currentBookIdx < bibleBooks.length - 1) {
        currentBookIdx++;
        currentChapter = 1;
      }
      syncAndLoad();
    }

    function goPrev() {
      if (currentChapter > 1) {
        currentChapter--;
      } else if (currentBookIdx > 0) {
        currentBookIdx--;
        currentChapter = bibleBooks[currentBookIdx].c;
      }
      syncAndLoad();
    }

    function syncAndLoad() {
      bookSelect.value = currentBookIdx;
      updateChapterDropdown();
      chapterSelect.value = currentChapter;
      loadChapter();
    }

    // Event Listeners
    bookSelect.addEventListener('change', (e) => {
      currentBookIdx = parseInt(e.target.value);
      currentChapter = 1;
      updateChapterDropdown();
      loadChapter();
    });

    chapterSelect.addEventListener('change', (e) => {
      currentChapter = parseInt(e.target.value);
      loadChapter();
    });

    nextBtn.addEventListener('click', goNext);
    prevBtn.addEventListener('click', goPrev);

    // Boot up
    initSelectors();
    loadChapter();
  </script>
</body>
</html>
